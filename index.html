<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro por voz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: auto;
      padding: 20px;
    }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }
    button {
      cursor: pointer;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row button {
      flex: 1;
    }
    #estado {
      margin-top: 10px;
      font-weight: bold;
    }
    .ok { color: green; }
    .err { color: #b00020; }
  </style>
</head>
<body>
  <h2>Registro por voz</h2>

  <input id="condominio" placeholder="Condominio">
  <input id="guardia" placeholder="Guardia">
  <textarea id="texto" rows="5" placeholder="Aquí aparecerá el texto detectado"></textarea>

  <div class="row">
    <button onclick="hablar()">🎤 Hablar</button>
    <button onclick="guardar()">💾 Guardar</button>
  </div>

  <div id="estado"></div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxLfoGr0CFoFAcXGj7XDBOtYxcb5s7hLIZNhcOgN1kQzKAKg0HSVZPKOnyLAEsAv7iy6g/exec";

    function estado(msg, tipo = "") {
      const el = document.getElementById("estado");
      el.textContent = msg;
      el.className = tipo;
    }

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    window.onload = function () {
      document.getElementById("condominio").value = getParam("condominio");
      document.getElementById("guardia").value = getParam("guardia");
    };

    function hablar() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SR) {
        estado("Este navegador no soporta reconocimiento de voz. Usa Chrome.", "err");
        return;
      }

      const rec = new SR();
      rec.lang = "es-CL";
      rec.interimResults = false;
      rec.maxAlternatives = 1;

      rec.onstart = function () {
        estado("Escuchando...", "ok");
      };

      rec.onresult = function (e) {
        const texto = e.results[0][0].transcript;
        document.getElementById("texto").value = texto;
        estado("Texto detectado.", "ok");
      };

      rec.onerror = function (e) {
        estado("Error de voz: " + e.error, "err");
      };

      rec.start();
    }

    async function guardar() {
      const payload = {
        condominio: document.getElementById("condominio").value.trim(),
        guardia: document.getElementById("guardia").value.trim(),
        textoBruto: document.getElementById("texto").value.trim()
      };

      if (!payload.textoBruto) {
        estado("No hay texto para guardar.", "err");
        return;
      }

      estado("Enviando...", "ok");

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        estado("Registro enviado. Revisa la hoja en 2 a 5 segundos.", "ok");
        document.getElementById("texto").value = "";

      } catch (e) {
        estado("Error de red: " + e.message, "err");
      }
    }
  </script>
</body>
</html>
