<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxLfoGr0CFoFAcXGj7XDBOtYxcb5s7hLIZNhcOgN1kQzKAKg0HSVZPKOnyLAEsAv7iy6g/exec";

function hablar(){

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SR){
alert("Tu navegador no soporta reconocimiento de voz");
return;
}

const rec = new SR();
rec.lang = "es-CL";
rec.interimResults = false;
rec.maxAlternatives = 1;

rec.onstart = function(){
document.getElementById("estado").innerText = "Escuchando...";
};

rec.onresult = function(e){
document.getElementById("texto").value = e.results[0][0].transcript;
document.getElementById("estado").innerText = "Texto detectado";
};

rec.onerror = function(e){
document.getElementById("estado").innerText = "Error: " + e.error;
};

rec.start();

}

async function guardar(){

const payload = {
condominio: document.getElementById("condominio").value.trim(),
guardia: document.getElementById("guardia").value.trim(),
textoBruto: document.getElementById("texto").value.trim()
};

if(!payload.textoBruto){
document.getElementById("estado").innerText = "No hay texto para guardar";
return;
}

document.getElementById("estado").innerText = "Guardando...";

try{

const res = await fetch(SCRIPT_URL,{
method:"POST",
headers:{
"Content-Type":"text/plain;charset=utf-8"
},
body: JSON.stringify(payload)
});

const raw = await res.text();

let data;
try{
data = JSON.parse(raw);
}catch(err){
document.getElementById("estado").innerText = "Respuesta no válida del script: " + raw;
return;
}

if(data.ok){
document.getElementById("estado").innerText = "Registro guardado";
document.getElementById("texto").value = "";
}else{
document.getElementById("estado").innerText = "Error del script: " + data.error;
}

}catch(e){

document.getElementById("estado").innerText = "Error al guardar: " + e.message;

}

}
</script>
